name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install google-genai pydantic tiktoken transformers requests python-dotenv mcp

    - name: Analisar código com o Pylint
      run: |
        pylint --disable=C0114,C0115,C0116,C0301,C0303,C0304,C0103,R0903,R0801,E0401,W0611,W1309,W0718 --max-line-length=160 $(git ls-files '*.py') || true