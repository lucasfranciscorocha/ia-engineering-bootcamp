name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"] # Versiones más alineadas al ecosistema actual de IA
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5 # Actualizado a v5 para mejor performance
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        # Si tienes un archivo requirements.txt con librerías de IA, descomenta la línea de abajo:
        # pip install -r requirements.txt
        
    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py')
