name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        # Instala automaticamente todas as bibliotecas de IA do seu projeto para o Pylint não se perder
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi      

    - name: Analisar código com o Pylint
      run: |
        # Verificamos se o arquivo está na raiz ou dentro da pasta dev e aplicamos
        if [ -f .pylintrc ]; then
          pylint --rcfile=.pylintrc $(git ls-files '*.py')
        elif [ -f dev/.pylintrc ]; then
          pylint --rcfile=dev/.pylintrc $(git ls-files '*.py')
        else
          # Se não achar em nenhum, rodamos ignorando os erros direto pela linha de comando
          pylint --disable=C0114,C0115,C0116,C0301,C0303,C0304,C0103,R0903,R0801,E0401,W0611,W1309,W0718 --max-line-length=160 $(git ls-files '*.py')
        fi